<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Personal Finance Tracker</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="top-bar">

      <h1>Personal Finance Tracker</h1>

      <button
        id="themeToggle"
        class="theme-toggle"
        type="button"
        aria-label="Switch to dark mode"
        title="Switch theme"
      >
        <span class="theme-icon"></span>
      </button>

    </div>

    <!-- Balance -->

    <div class="balance-card">

      <h3>Total Balance</h3>

      <h1 id="balance">₹0</h1>

    </div>

    <!-- Income Expense -->

    <div class="summary">

      <div class="income-box">

        <h3>Income</h3>

        <p id="income">₹0</p>

      </div>

      <div class="expense-box">

        <h3>Expense</h3>

        <p id="expense">₹0</p>

      </div>

    </div>

    <!-- Form -->

    <div class="form-box">

      <h2>Add Transaction</h2>

      <input
        type="text"
        id="title"
        placeholder="Enter title"
      >

      <input
        type="number"
        id="amount"
        placeholder="Enter amount"
      >

      <select id="type">

        <option value="income">
          Income
        </option>

        <option value="expense">
          Expense
        </option>

      </select>

      <button id="addBtn">
        Add Transaction
      </button>

    </div>

    <!-- Transaction List -->

    <div class="transaction-box">

      <div class="header">

        <h2>Transactions</h2>

        <button id="clearBtn">
          Clear All
        </button>

      </div>

      <ul id="transactionList"></ul>

    </div>

    <!-- API Quote -->

    <div class="quote-box">

      <h2>Daily Finance Quote</h2>

      <p id="quote">
        Loading quote...
      </p>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
